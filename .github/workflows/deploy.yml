# Deploy to your VPS: add these repository secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST       — server hostname or IP
#   DEPLOY_USER       — SSH user (e.g. deploy, ubuntu, root)
#   DEPLOY_SSH_KEY    — private key (full PEM, including BEGIN/END lines)
#   DEPLOY_PATH       — absolute path to this repo on the server (e.g. /opt/roveltia)
#
# On the server once: clone repo, copy .env.example → .env, set POSTGRES_PASSWORD, add deploy user SSH public key.
# Trigger: Actions → Deploy → Run workflow.

name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin
            git reset --hard origin/main
            docker compose build
            docker compose up -d
