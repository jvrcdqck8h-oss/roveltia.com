name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore and build
        run: |
          dotnet restore Roveltia.Web/Roveltia.Web.csproj
          dotnet build Roveltia.Web/Roveltia.Web.csproj -c Release --no-restore

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef --version 10.0.5

      - name: Verify migrations (no database)
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef migrations list --project Roveltia.Web/Roveltia.Web.csproj --no-connect
